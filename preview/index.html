<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDS Starry UI 2.0 — 设计系统预览</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text">Starry UI 2.0</span>
        </div>

        <!-- Brand Switcher -->
        <div class="brand-switcher">
          <span class="switcher-label">品牌切换：</span>
          <div class="brand-buttons">
            <button class="brand-btn active" data-brand="zeekr" onclick="switchBrand('zeekr')">
              <span class="brand-color" style="background: #F56200"></span>
              极氪 Zeekr
            </button>
            <button class="brand-btn" data-brand="lynkco" onclick="switchBrand('lynkco')">
              <span class="brand-color" style="background: #4D88FB"></span>
              领克 LynkCo
            </button>
            <button class="brand-btn" data-brand="after-sales" onclick="switchBrand('after-sales')">
              <span class="brand-color" style="background: #2E5EFF"></span>
              售后 After-Sales
            </button>
          </div>
        </div>

        <!-- Copy Button -->
        <button class="copy-btn" onclick="copyDesignMD()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          复制 DESIGN.md
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Color Section -->
      <section class="section">
        <h2 class="section-title">色彩系统 Color System</h2>

        <!-- Brand Colors -->
        <div class="subsection">
          <h3 class="subsection-title">品牌色 Brand Colors</h3>
          <div class="color-grid" id="brand-colors"></div>
        </div>

        <!-- Gray Scale -->
        <div class="subsection">
          <h3 class="subsection-title">中性色 Gray Scale</h3>
          <div class="color-strip" id="gray-colors"></div>
        </div>

        <!-- Status Colors -->
        <div class="subsection">
          <h3 class="subsection-title">功能色 Status Colors</h3>
          <div class="color-grid" id="status-colors"></div>
        </div>

        <!-- Support Colors -->
        <div class="subsection">
          <h3 class="subsection-title">辅助色 Support Colors</h3>
          <div class="support-colors" id="support-colors"></div>
        </div>
      </section>

      <!-- Radius Section -->
      <section class="section">
        <h2 class="section-title">圆角系统 Border Radius</h2>
        <div class="radius-showcase" id="radius-showcase"></div>
      </section>

      <!-- Typography Section -->
      <section class="section">
        <h2 class="section-title">字体层级 Typography</h2>
        <div class="typography-scale" id="typography-scale"></div>
      </section>

      <!-- Spacing Section -->
      <section class="section">
        <h2 class="section-title">间距系统 Spacing</h2>
        <div class="spacing-scale" id="spacing-scale"></div>
      </section>

      <!-- Components Section -->
      <section class="section">
        <h2 class="section-title">组件示例 Components</h2>

        <!-- Buttons -->
        <div class="subsection">
          <h3 class="subsection-title">按钮 Button</h3>
          <div class="component-row">
            <div class="button-group">
              <label>大按钮</label>
              <div class="buttons">
                <button class="btn btn-primary btn-lg">主要按钮</button>
                <button class="btn btn-secondary btn-lg">次要按钮</button>
                <button class="btn btn-outline btn-lg">线性按钮</button>
                <button class="btn btn-text btn-lg">文本按钮</button>
              </div>
            </div>
          </div>
          <div class="component-row">
            <div class="button-group">
              <label>中按钮</label>
              <div class="buttons">
                <button class="btn btn-primary btn-md">主要按钮</button>
                <button class="btn btn-secondary btn-md">次要按钮</button>
                <button class="btn btn-outline btn-md">线性按钮</button>
                <button class="btn btn-text btn-md">文本按钮</button>
              </div>
            </div>
          </div>
          <div class="component-row">
            <div class="button-group">
              <label>小按钮</label>
              <div class="buttons">
                <button class="btn btn-primary btn-sm">主要按钮</button>
                <button class="btn btn-secondary btn-sm">次要按钮</button>
                <button class="btn btn-outline btn-sm">线性按钮</button>
                <button class="btn btn-text btn-sm">文本按钮</button>
              </div>
            </div>
          </div>
          <div class="component-row">
            <div class="button-group">
              <label>状态</label>
              <div class="buttons">
                <button class="btn btn-primary btn-md">默认</button>
                <button class="btn btn-primary btn-md btn-loading">加载中</button>
                <button class="btn btn-primary btn-md" disabled>禁用</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Navigation Bar -->
        <div class="subsection">
          <h3 class="subsection-title">导航栏 Navigation Bar</h3>
          <div class="nav-preview">
            <div class="navbar">
              <div class="navbar-left">
                <span class="navbar-back">←</span>
              </div>
              <div class="navbar-title">页面标题</div>
              <div class="navbar-right">
                <span class="navbar-icon">⋯</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="subsection">
          <h3 class="subsection-title">选项卡 Tabs</h3>
          <div class="tabs-preview">
            <div class="tabs tabs-line">
              <div class="tab active">选项一</div>
              <div class="tab">选项二</div>
              <div class="tab">选项三</div>
            </div>
          </div>
          <div class="tabs-preview">
            <div class="tabs tabs-capsule">
              <div class="tab active">选项一</div>
              <div class="tab">选项二</div>
              <div class="tab">选项三</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">已复制到剪贴板</div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
